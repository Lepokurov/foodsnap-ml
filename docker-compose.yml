services:
  postgres:
    image: postgres:16
    container_name: foodsnap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: foodsnap
      POSTGRES_USER: foodsnap
      POSTGRES_PASSWORD: foodsnap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foodsnap -d foodsnap"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: foodsnap-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meal-analysis-consumer:
    build:
      context: .
      dockerfile: docker/Dockerfile.meal-analysis-consumer
    image: foodsnap-meal-analysis-consumer:local
    container_name: foodsnap-meal-analysis-consumer
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://foodsnap:foodsnap@postgres:5432/foodsnap
      QUEUE_BACKEND: rabbitmq
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_MEAL_ANALYSIS_QUEUE: foodsnap.meal_analysis
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  food-reference-import-consumer:
    build:
      context: .
      dockerfile: docker/Dockerfile.food-reference-import-consumer
    image: foodsnap-food-reference-import-consumer:local
    container_name: foodsnap-food-reference-import-consumer
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://foodsnap:foodsnap@postgres:5432/foodsnap
      QUEUE_BACKEND: rabbitmq
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      RABBITMQ_FOOD_REFERENCE_IMPORT_QUEUE: foodsnap.food_reference_import
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
