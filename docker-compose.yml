services:
  postgres:
    image: postgres:16
    container_name: foodsnap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: foodsnap
      POSTGRES_USER: foodsnap
      POSTGRES_PASSWORD: foodsnap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foodsnap -d foodsnap"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
